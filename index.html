<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure: Year 1</title>
    <style>
        :root {
            --primary: #4cc9f0;
            --secondary: #f72585;
            --success: #4ade80;
            --warning: #fb8500;
            --bg: #fdf0d5;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); }

        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* --- UI ELEMENTS --- */
        #game-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .screen { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        h1 { color: var(--secondary); font-size: 2.5rem; text-shadow: 3px 3px white; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px #3a0ca3;
            transition: all 0.1s;
            margin: 10px;
            display: inline-block;
        }
        .btn:hover { transform: scale(1.05); background: #4895ef; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #3a0ca3; }

        /* --- PROGRESS BAR --- */
        .progress-container {
            width: 100%;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--success);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* --- LEVELS --- */
        .item-display { font-size: 8rem; margin: 20px; display: block; animation: bounce 2s infinite; }
        
        /* Spelling Bee */
        .letter-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .letter-tile {
            width: 50px; height: 50px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .letter-tile.used { opacity: 0.3; pointer-events: none; }

        /* Voice Recognition */
        .mic-btn { font-size: 3rem; background: var(--secondary); border-radius: 50%; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
        .recording { animation: pulse 1s infinite; background: red !important; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes tilt-left { from { transform: rotate(0); } to { transform: rotate(-15deg); } }
        @keyframes tilt-right { from { transform: rotate(0); } to { transform: rotate(15deg); } }

        /* Confetti */
        .confetti { position: fixed; width: 10px; height: 10px; background: red; z-index: 1000; }
        
        /* Leaderboard Table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        .top-score { background: #fff3b0; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-login" class="screen active">
        <h1>School Fun! 🎒</h1>
        <p style="font-size: 1.2rem;">Enter your name to start:</p>
        <input type="text" id="player-name" placeholder="Your Name" style="padding: 15px; border-radius: 10px; border: 2px solid var(--primary); width: 80%; font-size: 1.2rem; margin-bottom: 20px;">
        <br>
        <button class="btn" onclick="startGame()">Go! 🚀</button>
    </div>

    <div id="screen-l1" class="screen">
        <div class="progress-container"><div id="progress-bar" style="width: 25%"></div></div>
        <h2>Level 1: Is this correct?</h2>
        <div id="l1-emoji" class="item-display">🖊️</div>
        <h3 id="l1-word">Is this a PEN?</h3>
        <p>(Tilt Left for YES, Right for NO)</p>
        <div style="display: flex; justify-content: center;">
            <button class="btn" style="background: var(--success);" onclick="checkL1(true)">YES ✅</button>
            <button class="btn" style="background: var(--secondary);" onclick="checkL1(false)">NO ❌</button>
        </div>
    </div>

    <div id="screen-l2" class="screen">
        <div class="progress-container"><div id="progress-bar" style="width: 50%"></div></div>
        <h2>Level 2: Spell it!</h2>
        <div id="l2-emoji" class="item-display">🎒</div>
        <div id="spelling-answer" style="font-size: 2rem; letter-spacing: 5px; min-height: 40px; color: var(--secondary); font-weight: bold;"></div>
        <div id="l2-letters" class="letter-container"></div>
        <button class="btn" style="background: #ccc; font-size: 1rem;" onclick="resetSpelling()">Reset 🔄</button>
    </div>

    <div id="screen-l3" class="screen">
        <div class="progress-container"><div id="progress-bar" style="width: 75%"></div></div>
        <h2>Level 3: Speak! 🎤</h2>
        <div id="l3-emoji" class="item-display">👟</div>
        <h3>Say the word: <span id="l3-target" style="color: var(--secondary)">SHOES</span></h3>
        <button id="mic-btn" class="mic-btn" onclick="startVoice()">🎤</button>
        <p id="voice-msg">Press the mic and talk!</p>
    </div>

    <div id="screen-l4" class="screen">
        <div class="progress-container"><div id="progress-bar" style="width: 90%"></div></div>
        <h2>Level 4: Build it!</h2>
        <div id="l4-emoji" class="item-display">🪑</div>
        <div id="sentence-target" style="border-bottom: 2px dashed #999; min-height: 50px; margin-bottom: 20px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap;"></div>
        <div id="sentence-options" class="letter-container"></div>
    </div>

    <div id="screen-score" class="screen">
        <h1>Finished! 🎉</h1>
        <h2 id="final-msg">Great Job!</h2>
        <table id="leaderboard">
            <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <button class="btn" onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<script>
    // --- DATA ---
    const vocabulary = [
        { word: 'pen', emoji: '🖊️' },
        { word: 'pencil', emoji: '✏️' },
        { word: 'desk', emoji: '🖥️' },
        { word: 'chair', emoji: '🪑' },
        { word: 'bag', emoji: '🎒' },
        { word: 'shoes', emoji: '👟' },
        { word: 'book', emoji: '📖' },
        { word: 'ruler', emoji: '📏' },
        { word: 'rubber', emoji: '🧼' }
    ];

    let playerName = "";
    let score = 0;
    let currentL1Index = 0;
    let currentL2Index = 0;
    let currentL4Index = 0;
    let spellingGuess = "";

    // --- AUDIO SIMULATION ---
    function playSound(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);
            gain.gain.fadeOut = 0.2;
            createConfetti();
        } else {
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
        }
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    }

    // --- SCREEN NAVIGATION ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGame() {
        playerName = document.getElementById('player-name').value || "Student";
        showScreen('screen-l1');
        initL1();
    }

    // --- LEVEL 1: TILT ---
    function initL1() {
        const item = vocabulary[currentL1Index];
        const isMatch = Math.random() > 0.5;
        const displayWord = isMatch ? item.word : vocabulary[(currentL1Index + 1) % vocabulary.length].word;
        
        document.getElementById('l1-emoji').innerText = item.emoji;
        document.getElementById('l1-word').innerText = `Is this a ${displayWord.toUpperCase()}?`;
        document.getElementById('l1-word').dataset.answer = isMatch;
    }

    function checkL1(userResponse) {
        const correct = (userResponse.toString() === document.getElementById('l1-word').dataset.answer);
        if (correct) {
            score += 10;
            playSound('correct');
            showScreen('screen-l2');
            initL2();
        } else {
            playSound('wrong');
            alert("Try again! 🤗");
        }
    }

    // Gyroscope Logic
    window.addEventListener('deviceorientation', (event) => {
        if (document.getElementById('screen-l1').classList.contains('active')) {
            if (event.gamma < -20) checkL1(true); // Tilt Left
            if (event.gamma > 20) checkL1(false); // Tilt Right
        }
    });

    // --- LEVEL 2: SPELLING ---
    function initL2() {
        const item = vocabulary[4]; // Bag
        document.getElementById('l2-emoji').innerText = item.emoji;
        const letters = item.word.split('').sort(() => Math.random() - 0.5);
        const container = document.getElementById('l2-letters');
        container.innerHTML = '';
        spellingGuess = "";
        document.getElementById('spelling-answer').innerText = "_ _ _";

        letters.forEach(char => {
            const tile = document.createElement('div');
            tile.className = 'letter-tile';
            tile.innerText = char.toUpperCase();
            tile.onclick = () => {
                tile.classList.add('used');
                spellingGuess += char;
                document.getElementById('spelling-answer').innerText = spellingGuess.toUpperCase();
                if (spellingGuess.length === item.word.length) {
                    if (spellingGuess === item.word) {
                        score += 20;
                        playSound('correct');
                        setTimeout(() => { showScreen('screen-l3'); initL3(); }, 1000);
                    } else {
                        playSound('wrong');
                        resetSpelling();
                    }
                }
            };
            container.appendChild(tile);
        });
    }

    function resetSpelling() {
        spellingGuess = "";
        document.getElementById('spelling-answer').innerText = "";
        document.querySelectorAll('.letter-tile').forEach(t => t.classList.remove('used'));
    }

    // --- LEVEL 3: VOICE ---
    function initL3() {
        const item = vocabulary[5]; // Shoes
        document.getElementById('l3-emoji').innerText = item.emoji;
        document.getElementById('l3-target').innerText = item.word.toUpperCase();
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        const mic = document.getElementById('mic-btn');
        mic.classList.add('recording');
        
        recognition.start();

        recognition.onresult = (event) => {
            const speech = event.results[0][0].transcript.toLowerCase();
            mic.classList.remove('recording');
            if (speech.includes(vocabulary[5].word)) {
                score += 20;
                playSound('correct');
                showScreen('screen-l4');
                initL4();
            } else {
                document.getElementById('voice-msg').innerText = `You said "${speech}". Try again!`;
                playSound('wrong');
            }
        };
        recognition.onerror = () => mic.classList.remove('recording');
    }

    // --- LEVEL 4: SENTENCE ---
    function initL4() {
        const item = vocabulary[3]; // Chair
        document.getElementById('l4-emoji').innerText = item.emoji;
        const sentence = ["It", "is", "a", "chair"];
        const shuffled = [...sentence].sort(() => Math.random() - 0.5);
        const targetDiv = document.getElementById('sentence-target');
        const optionsDiv = document.getElementById('sentence-options');
        targetDiv.innerHTML = "";
        optionsDiv.innerHTML = "";

        shuffled.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.fontSize = '1rem';
            btn.innerText = word;
            btn.onclick = () => {
                const span = document.createElement('span');
                span.innerText = word + " ";
                span.style.fontSize = '1.5rem';
                targetDiv.appendChild(span);
                btn.style.display = 'none';
                
                if (targetDiv.innerText.trim().toLowerCase() === "it is a chair") {
                    score += 50;
                    playSound('correct');
                    setTimeout(endGame, 1000);
                }
            };
            optionsDiv.appendChild(btn);
        });
    }

    // --- SCOREBOARD ---
    function endGame() {
        showScreen('screen-score');
        const history = JSON.parse(localStorage.getItem('english_scores') || '[]');
        history.push({ name: playerName, score: score });
        history.sort((a, b) => b.score - a.score);
        localStorage.setItem('english_scores', JSON.stringify(history.slice(0, 5)));

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = history.slice(0, 5).map((entry, i) => `
            <tr class="${i === 0 ? 'top-score' : ''}">
                <td>${i === 0 ? '🥇' : i + 1}</td>
                <td>${entry.name}</td>
                <td>${entry.score} ⭐</td>
            </tr>
        `).join('');
    }

    // --- EFFECTS ---
    function createConfetti() {
        for (let i = 0; i < 20; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = ['#ff0','#f0f','#0ff'][Math.floor(Math.random()*3)];
            conf.style.top = '-10px';
            document.body.appendChild(conf);
            
            const animation = conf.animate([
                { transform: 'translateY(0) rotate(0)' },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)` }
            ], { duration: 2000 });
            animation.onfinish = () => conf.remove();
        }
    }
</script>

</body>
</html>
