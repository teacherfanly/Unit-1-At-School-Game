<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure Hero</title>
    <style>
        :root {
            --primary: #4cc9f0; --secondary: #f72585; --success: #4ade80;
            --danger: #ff4d4d; --bg: #fdf0d5; --neutral: #ced4da;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Comic Sans MS', cursive, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            user-select: none;
        }
        #game-container { width: 100%; max-width: 650px; padding: 20px; text-align: center; position: relative; }
        .screen { display: none; animation: popIn 0.4s ease-out; }
        .active { display: block; }
        
        /* UI Elements */
        .btn {
            background: var(--primary); color: white; border: none; padding: 15px 35px;
            border-radius: 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px #3a0ca3; margin: 10px; transition: 0.2s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #3a0ca3; }
        .btn-next { background: #ffbe0b !important; box-shadow: 0 6px #fb5607 !important; display: none; margin-top: 20px; width: 80%; }
        
        .progress-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin: 10px 0; border: 2px solid #fff; }
        #inner-progress { width: 0%; height: 100%; background: var(--success); border-radius: 8px; transition: 0.3s; }
        
        /* Feedback Message */
        #feedback-banner { font-size: 2rem; font-weight: bold; margin: 10px 0; min-height: 2.5rem; transition: 0.3s; }
        .correct-text { color: var(--success); transform: scale(1.1); }
        .wrong-text { color: var(--danger); }

        /* Level 1 Camera Layout */
        .q-area { background: white; border-radius: 25px; padding: 15px; margin-bottom: 15px; box-shadow: 0 8px #e9ecef; position: relative; }
        #camera-wrapper { 
            position: relative; width: 480px; height: 320px; margin: 0 auto; 
            border: 10px solid white; border-radius: 30px; overflow: hidden; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .zone { 
            position: absolute; top: 0; width: 25%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.1rem; font-weight: bold; color: white; transition: 0.3s;
            background: rgba(0,0,0,0.2);
        }
        #left-zone { left: 0; border-right: 5px solid var(--success); }
        #right-zone { right: 0; border-left: 5px solid var(--danger); }
        .zone.selected-left { background: rgba(74, 222, 128, 0.7) !important; font-size: 1.5rem; }
        .zone.selected-right { background: rgba(255, 77, 77, 0.7) !important; font-size: 1.5rem; }
        
        /* Game Tiles */
        .tile-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
        .tile { 
            background: white; border: 3px solid var(--primary); padding: 15px 25px; 
            border-radius: 15px; cursor: pointer; font-size: 1.6rem; font-weight: bold;
            box-shadow: 0 5px var(--primary);
        }
        .tile.selected { background: #dee2e6; color: #adb5bd; box-shadow: none; transform: translateY(4px); pointer-events: none; }
        
        .emoji-large { font-size: 7rem; line-height: 1; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats" style="font-size: 1.5rem; font-weight: bold; color: var(--secondary); display: flex; justify-content: space-between; padding: 0 10px;">
        <span>⭐ <span id="current-score">0</span></span>
        <span>Question <span id="q-count">1</span>/10</span>
    </div>
    <div class="progress-bar"><div id="inner-progress"></div></div>
    <div id="feedback-banner"></div>

    <div id="screen-login" class="screen active">
        <h1 style="font-size: 3rem; color: var(--secondary);">English Hero! 👋</h1>
        <input type="text" id="p-name" placeholder="Enter your name" style="padding: 20px; border-radius: 25px; width: 80%; border: 4px solid var(--primary); font-size: 1.5rem; text-align: center;">
        <br><button class="btn" onclick="startLevel(1)" style="margin-top: 30px;">START 🚀</button>
    </div>

    <div id="screen-l1" class="screen">
        <div class="q-area">
            <div id="l1-emoji" class="emoji-large"></div>
            <h2 id="l1-question" style="font-size: 2rem; margin: 10px 0;">...</h2>
        </div>
        <div id="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div id="left-zone" class="zone">Yes, it is. ✅</div>
            <div id="right-zone" class="zone">No, it isn't. ❌</div>
        </div>
        <button id="l1-check-btn" class="btn" style="background: var(--secondary); display: none;" onclick="processL1Selection()">CHECK ANSWER ✅</button>
        <button id="l1-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
    </div>

    <div id="screen-l2" class="screen">
        <div class="q-area"><div id="l2-emoji" class="emoji-large"></div><div id="l2-display" style="font-size: 3rem; letter-spacing: 10px; color: var(--secondary); font-weight: bold; min-height: 60px;"></div></div>
        <div id="l2-options" class="tile-box"></div>
        <button id="l2-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
    </div>

    <div id="screen-l3" class="screen">
        <div class="q-area">
            <div id="l3-emoji" class="emoji-large"></div>
            <h3 style="font-size: 1.8rem;">Say: <br><span id="l3-target-text" style="color:var(--secondary); font-size: 2.2rem;">It is a bag.</span></h3>
        </div>
        <button id="mic-btn" class="btn" style="width:120px; height:120px; border-radius:50%; font-size:3.5rem;" onclick="startSpeech()">🎤</button>
        <button id="l3-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
    </div>

    <div id="screen-l4" class="screen">
        <div class="q-area">
            <div id="l4-emoji" class="emoji-large"></div>
            <div id="l4-display" style="border-bottom: 5px dashed var(--primary); min-height: 80px; font-size: 1.8rem; display: flex; justify-content: center; align-items: center; gap: 10px;"></div>
        </div>
        <div id="l4-options" class="tile-box"></div>
        <div id="l4-controls">
            <button id="l4-check-btn" class="btn" style="background:var(--success)" onclick="checkL4()">CHECK ✅</button>
            <button id="l4-reset-btn" class="btn" style="background:var(--danger)" onclick="resetL4()">RESET ❌</button>
        </div>
        <button id="l4-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
    </div>

    <div id="screen-final" class="screen">
        <h1 style="font-size: 3rem;">Finish! 🎉</h1>
        <div id="final-stats" style="font-size: 1.8rem; background: white; padding: 30px; border-radius: 40px; border: 8px solid var(--success);"></div>
        <button class="btn" onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>
</div>

<script>
    const vocab = [
        {w: 'pen', e: '🖊️'}, {w: 'pencil', e: '✏️'}, {w: 'desk', e: '🖥️'},
        {w: 'chair', e: '🪑'}, {w: 'bag', e: '🎒'}, {w: 'shoes', e: '👟'},
        {w: 'book', e: '📖'}, {w: 'ruler', e: '📏'}, {w: 'rubber', e: '🧼'},
        {w: 'notebook', e: '📓'}
    ];

    let currentLevel = 1;
    let questionIndex = 0;
    let totalScore = 0;
    let videoStream = null;
    let tempChoice = null;
    let isQuestionAnswered = false;

    // --- UTILS ---
    function showFeedback(isCorrect, text) {
        const banner = document.getElementById('feedback-banner');
        banner.innerText = text;
        banner.className = isCorrect ? 'correct-text' : 'wrong-text';
        if (isCorrect) createConfetti();
    }

    function clearFeedback() {
        document.getElementById('feedback-banner').innerText = "";
        document.getElementById('feedback-banner').className = "";
    }

    // --- ENGINE ---
    function nextQuestion() {
        clearFeedback();
        isQuestionAnswered = false;
        document.querySelectorAll('.btn-next').forEach(b => b.style.display = 'none');
        
        questionIndex++;
        if (questionIndex >= 10) {
            if (currentLevel === 1) stopCamera();
            currentLevel++;
            questionIndex = 0;
            if (currentLevel > 4) return finishGame();
            startLevel(currentLevel);
        } else {
            document.getElementById('q-count').innerText = questionIndex + 1;
            document.getElementById('inner-progress').style.width = (questionIndex * 10) + "%";
            loadQuestion();
        }
    }

    // --- LEVEL 1: CAMERA (LOCK-IN FLOW) ---
    async function initL1Camera() {
        const video = document.getElementById('video');
        videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = videoStream;
        detectMotion();
    }

    function stopCamera() { if (videoStream) videoStream.getTracks().forEach(t => t.stop()); }

    function detectMotion() {
        if (currentLevel !== 1 || isQuestionAnswered) return;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 160; canvas.height = 120;

        const loop = () => {
            if (currentLevel !== 1 || isQuestionAnswered) return;
            ctx.drawImage(document.getElementById('video'), 0, 0, 160, 120);
            const frame = ctx.getImageData(0, 0, 160, 120);
            let leftDark = 0, rightDark = 0;
            for (let i = 0; i < frame.data.length; i += 4) {
                const x = (i / 4) % 160;
                const brightness = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
                if (brightness < 90) { 
                    if (x < 40) leftDark++;
                    if (x > 120) rightDark++;
                }
            }
            if (leftDark > 1000) { tempChoice = true; highlightZone('left'); } 
            else if (rightDark > 1000) { tempChoice = false; highlightZone('right'); }
            requestAnimationFrame(loop);
        };
        loop();
    }

    function highlightZone(side) {
        document.getElementById('left-zone').className = 'zone' + (side === 'left' ? ' selected-left' : '');
        document.getElementById('right-zone').className = 'zone' + (side === 'right' ? ' selected-right' : '');
        document.getElementById('l1-check-btn').style.display = 'inline-block';
    }

    function processL1Selection() {
        isQuestionAnswered = true;
        const isMatch = document.getElementById('l1-question').dataset.ans === "true";
        if (tempChoice === isMatch) { totalScore += 10; showFeedback(true, "Great Job! 🌟"); }
        else { showFeedback(false, "Oops! Try better next time. 🤗"); }
        
        document.getElementById('current-score').innerText = totalScore;
        document.getElementById('l1-check-btn').style.display = 'none';
        document.getElementById('l1-next-btn').style.display = 'inline-block';
    }

    function initL1Question() {
        const item = vocab[questionIndex];
        const isMatch = Math.random() > 0.5;
        document.getElementById('l1-emoji').innerText = item.e;
        document.getElementById('l1-question').innerText = `Is it a ${isMatch ? item.w : vocab[(questionIndex+2)%10].w}?`;
        document.getElementById('l1-question').dataset.ans = isMatch;
    }

    // --- LEVEL 2: SPELLING (NO DESK) ---
    function initL2() {
        let item = vocab[questionIndex];
        if (item.w === 'desk') item = vocab[9];
        document.getElementById('l2-emoji').innerText = item.e;
        document.getElementById('l2-display').innerText = "";
        const opt = document.getElementById('l2-options');
        opt.innerHTML = "";
        let guess = "";
        (item.w).split("").sort(() => Math.random() - 0.5).forEach(c => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = c.toUpperCase();
            t.onclick = () => {
                t.classList.add('selected');
                guess += c;
                document.getElementById('l2-display').innerText = guess.toUpperCase();
                if (guess.length === item.w.length) {
                    if (guess === item.w) {
                        totalScore += 10; document.getElementById('current-score').innerText = totalScore;
                        showFeedback(true, "Perfect Spelling! 🏆");
                        document.getElementById('l2-next-btn').style.display = 'inline-block';
                    } else { showFeedback(false, "Try spelling again!"); setTimeout(resetL2, 1000); }
                }
            };
            opt.appendChild(t);
        });
    }
    function resetL2() { clearFeedback(); document.getElementById('l2-display').innerText = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); }

    // --- LEVEL 3: VOICE ---
    function initL3() {
        const item = vocab[questionIndex];
        document.getElementById('l3-emoji').innerText = item.e;
        document.getElementById('l3-target-text').innerText = `It is a ${item.w}.`;
        document.getElementById('mic-btn').style.display = 'inline-block';
    }
    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'en-US';
        document.getElementById('mic-btn').style.boxShadow = '0 0 20px red';
        rec.start();
        rec.onresult = (e) => {
            const speech = e.results[0][0].transcript.toLowerCase();
            const target = `it is a ${vocab[questionIndex].w}`;
            if (speech.includes(target) || speech.includes(vocab[questionIndex].w)) {
                totalScore += 10; document.getElementById('current-score').innerText = totalScore;
                showFeedback(true, "Wonderful Speaking! 🎤");
                document.getElementById('mic-btn').style.display = 'none';
                document.getElementById('l3-next-btn').style.display = 'inline-block';
            } else { showFeedback(false, "I heard something else. Try again! 📣"); }
            document.getElementById('mic-btn').style.boxShadow = '0 6px #3a0ca3';
        };
    }

    // --- LEVEL 4: SENTENCE ---
    let l4Current = [];
    function initL4() {
        const item = vocab[questionIndex];
        l4Current = [];
        document.getElementById('l4-emoji').innerText = item.e;
        document.getElementById('l4-display').innerHTML = "";
        document.getElementById('l4-controls').style.display = 'block';
        const opt = document.getElementById('l4-options');
        opt.innerHTML = "";
        ["It", "is", "a", item.w].sort(() => Math.random() - 0.5).forEach(w => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = w;
            t.onclick = () => {
                t.classList.add('selected');
                l4Current.push(w);
                const s = document.createElement('span'); s.innerText = w;
                document.getElementById('l4-display').appendChild(s);
            };
            opt.appendChild(t);
        });
    }
    function checkL4() {
        const correct = `Itisa${vocab[questionIndex].w}`.toLowerCase();
        if (l4Current.join("").toLowerCase() === correct) {
            totalScore += 10; document.getElementById('current-score').innerText = totalScore;
            showFeedback(true, "Great Sentence! ✍️");
            document.getElementById('l4-controls').style.display = 'none';
            document.getElementById('l4-next-btn').style.display = 'inline-block';
        } else { showFeedback(false, "Check the order!"); resetL4(); }
    }
    function resetL4() { l4Current = []; document.getElementById('l4-display').innerHTML = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); }

    // --- CORE NAVIGATION ---
    function startLevel(lvl) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-l${lvl}`).classList.add('active');
        if (lvl === 1) initL1Camera();
        loadQuestion();
    }
    function loadQuestion() {
        if (currentLevel === 1) initL1Question();
        if (currentLevel === 2) initL2();
        if (currentLevel === 3) initL3();
        if (currentLevel === 4) initL4();
    }
    function finishGame() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-final').classList.add('active');
        document.getElementById('final-stats').innerHTML = `Superstar: <b>${document.getElementById('p-name').value}</b><br>Score: ${totalScore} ⭐`;
    }
    function createConfetti() {
        for(let i=0; i<20; i++) {
            const c = document.createElement('div');
            c.style.position = 'fixed'; c.style.left = Math.random()*100+'vw'; c.style.top = '-10px';
            c.style.width = '10px'; c.style.height = '10px'; c.style.zIndex = '100';
            c.style.backgroundColor = ['#f72585','#4cc9f0','#4ade80','#fb8500'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([{transform:'translateY(0)'},{transform:'translateY(100vh) rotate(720deg)'}], {duration: 2000}).onfinish = () => c.remove();
        }
    }
</script>
</body>
</html>
