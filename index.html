<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure Hero</title>
    <style>
        :root {
            --primary: #4cc9f0; --secondary: #f72585; --success: #4ade80;
            --danger: #ff4d4d; --bg: #fdf0d5;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Comic Sans MS', cursive, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        #game-container { width: 100%; max-width: 650px; padding: 20px; text-align: center; }
        .screen { display: none; animation: popIn 0.4s ease-out; }
        .active { display: block; }
        
        .btn {
            background: var(--primary); color: white; border: none; padding: 15px 35px;
            border-radius: 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px #3a0ca3; margin: 10px; transition: 0.2s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #3a0ca3; }
        .btn-next { background: #ffbe0b !important; box-shadow: 0 6px #fb5607 !important; display: none; margin-top: 20px; width: 80%; }
        
        .progress-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin: 10px 0; }
        #inner-progress { width: 0%; height: 100%; background: var(--success); border-radius: 8px; transition: 0.3s; }
        
        #feedback-banner { font-size: 2rem; font-weight: bold; margin: 10px 0; min-height: 2.5rem; }
        .correct-text { color: var(--success); }
        .wrong-text { color: var(--danger); }

        .q-area { background: white; border-radius: 25px; padding: 15px; margin-bottom: 15px; box-shadow: 0 8px #e9ecef; }
        #camera-wrapper { 
            position: relative; width: 480px; height: 320px; margin: 0 auto; 
            border: 10px solid white; border-radius: 30px; overflow: hidden; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .zone { 
            position: absolute; top: 0; width: 30%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: bold; color: white; transition: 0.3s;
            background: rgba(0,0,0,0.3); pointer-events: none;
        }
        #left-zone { left: 0; border-right: 5px solid var(--success); }
        #right-zone { right: 0; border-left: 5px solid var(--danger); }
        .zone.selected-left { background: rgba(74, 222, 128, 0.8) !important; }
        .zone.selected-right { background: rgba(255, 77, 77, 0.8) !important; }
        
        .tile-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
        .tile { 
            background: white; border: 3px solid var(--primary); padding: 15px 25px; 
            border-radius: 15px; cursor: pointer; font-size: 1.6rem; font-weight: bold;
            box-shadow: 0 5px var(--primary);
        }
        .tile.selected { opacity: 0.3; pointer-events: none; }

        #leaderboard { 
            background: white; border-radius: 20px; padding: 15px; 
            margin: 20px 0; box-shadow: 0 4px #ddd; text-align: left;
        }
        
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats" style="font-size: 1.5rem; font-weight: bold; color: var(--secondary); display: flex; justify-content: space-between;">
        <span>⭐ <span id="current-score">0</span></span>
        <span>Question <span id="q-count">1</span>/8</span>
    </div>
    <div class="progress-bar"><div id="inner-progress"></div></div>
    <div id="feedback-banner"></div>

    <div id="screen-login" class="screen active">
        <h1 style="font-size: 3rem; color: var(--secondary); margin-bottom: 10px;">English Hero! 👋</h1>
        
        <div id="leaderboard">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); text-align: center;">🏆 Hall of Fame</h3>
            <div id="score-list" style="font-size: 1.2rem; min-height: 50px;">
                Loading scores...
            </div>
        </div>

        <input type="text" id="p-name" placeholder="Enter Hero Name" style="padding: 15px; border-radius: 20px; width: 80%; border: 4px solid var(--primary); font-size: 1.5rem; text-align: center;">
        <br><button class="btn" onclick="startGame()" style="margin-top: 20px;">START 🚀</button>
    </div>

    <div id="screen-l1" class="screen">
        <div class="q-area"><div id="l1-emoji" style="font-size: 6rem;"></div><h2 id="l1-question" style="font-size: 1.8rem;">...</h2></div>
        <div id="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div id="left-zone" class="zone">YES ✅<br>(Lean Right)</div>
            <div id="right-zone" class="zone">NO ❌<br>(Lean Left)</div>
        </div>
        <button id="l1-check-btn" class="btn" style="display: none; width: 80%;" onclick="processL1Selection()">LOCK ANSWER ✅</button>
        <button id="l1-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT QUESTION ➡️</button>
    </div>

    <div id="screen-l2" class="screen">
        <div class="q-area"><div id="l2-emoji" style="font-size: 6rem;"></div><div id="l2-display" style="font-size: 3rem; color: var(--secondary); font-weight: bold; min-height: 60px;"></div></div>
        <div id="l2-options" class="tile-box"></div>
        <button id="l2-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT ➡️</button>
    </div>

    <div id="screen-l3" class="screen">
        <div class="q-area"><div id="l3-emoji" style="font-size: 6rem;"></div><h3 id="l3-target-text" style="font-size: 2rem; color: var(--secondary);">...</h3></div>
        <button id="mic-btn" class="btn" style="width:120px; height:120px; border-radius:50%; font-size:3rem;" onclick="startSpeech()">🎤</button>
        <p>Click the mic and speak!</p>
        <button id="l3-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT ➡️</button>
    </div>

    <div id="screen-l4" class="screen">
        <div class="q-area"><div id="l4-emoji" style="font-size: 6rem;"></div><div id="l4-display" style="font-size: 1.8rem; padding: 10px; min-height: 40px; color: var(--secondary); font-weight: bold;"></div></div>
        <div id="l4-options" class="tile-box"></div>
        <button id="l4-next-btn" class="btn btn-next" onclick="nextQuestion()">NEXT ➡️</button>
    </div>

    <div id="screen-final" class="screen">
        <h1>Finish! 🎉</h1>
        <div id="final-stats" style="font-size: 2.5rem; background: white; padding: 30px; border-radius: 20px; margin-bottom: 20px;"></div>
        <button class="btn" onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>
</div>

<script>
    const vocab = [
        {w: 'pen', e: '🖊️'}, {w: 'pencil', e: '✏️'}, 
        {w: 'chair', e: '🪑'}, {w: 'bag', e: '🎒'}, {w: 'shoes', e: '👟'},
        {w: 'book', e: '📖'}, {w: 'ruler', e: '📏'}, 
        {w: 'notebook', e: '📓'}
    ];

    let currentLevel = 1, questionIndex = 0, totalScore = 0, videoStream = null, tempChoice = null, isQuestionAnswered = false;
    let playerName = "";

    window.onload = displayLeaderboard;

    function displayLeaderboard() {
        const scoreList = document.getElementById('score-list');
        const scores = JSON.parse(localStorage.getItem('heroScores')) || [];
        if (scores.length === 0) {
            scoreList.innerHTML = "<center>No legends yet. Start playing!</center>";
            return;
        }
        scores.sort((a, b) => b.score - a.score);
        scoreList.innerHTML = scores.slice(0, 5).map((s, i) => 
            `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px;">
                <span>${i+1}. <b>${s.name}</b></span> <span>${s.score} ⭐</span>
            </div>`
        ).join('');
    }

    function startGame() {
        const input = document.getElementById('p-name');
        if (!input.value.trim()) { alert("Enter your name first!"); return; }
        playerName = input.value.trim();
        startLevel(1);
    }

    function startLevel(lvl) {
        currentLevel = lvl;
        questionIndex = 0;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-l${lvl}`).classList.add('active');
        updateUI();
        if (lvl === 1) initL1Camera();
        loadQuestion();
    }

    function updateUI() {
        document.getElementById('q-count').innerText = questionIndex + 1;
        document.getElementById('inner-progress').style.width = (questionIndex / vocab.length * 100) + "%";
    }

    function nextQuestion() {
        isQuestionAnswered = false;
        tempChoice = null;
        document.getElementById('feedback-banner').innerText = "";
        document.querySelectorAll('.btn-next').forEach(b => b.style.display = 'none');
        
        if(currentLevel === 1) {
            document.getElementById('left-zone').className = 'zone';
            document.getElementById('right-zone').className = 'zone';
        }

        questionIndex++;
        if (questionIndex >= vocab.length) {
            if (currentLevel === 1) stopCamera();
            if (currentLevel >= 4) return finishGame();
            startLevel(currentLevel + 1);
        } else {
            updateUI();
            loadQuestion();
        }
    }

    // --- LEVEL 1: MOTION LOGIC ---
    async function initL1Camera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = videoStream;
            detectMotion();
        } catch(e) { alert("Camera required!"); }
    }

    function stopCamera() { if (videoStream) videoStream.getTracks().forEach(t => t.stop()); }

    function detectMotion() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 160; canvas.height = 120;
        
        const loop = () => {
            if (currentLevel !== 1 || isQuestionAnswered) {
                if (currentLevel === 1) requestAnimationFrame(loop);
                return;
            }
            ctx.drawImage(document.getElementById('video'), 0, 0, 160, 120);
            const frame = ctx.getImageData(0, 0, 160, 120);
            let leftDark = 0, rightDark = 0;
            for (let i = 0; i < frame.data.length; i += 4) {
                const x = (i / 4) % 160;
                const brightness = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
                if (brightness < 80) { 
                    if (x < 40) leftDark++; 
                    if (x > 120) rightDark++;
                }
            }
            if (leftDark > 1200) { tempChoice = true; highlightZone('left'); } 
            else if (rightDark > 1200) { tempChoice = false; highlightZone('right'); }
            requestAnimationFrame(loop);
        };
        loop();
    }

    function highlightZone(side) {
        if (isQuestionAnswered) return;
        document.getElementById('left-zone').className = 'zone' + (side === 'left' ? ' selected-left' : '');
        document.getElementById('right-zone').className = 'zone' + (side === 'right' ? ' selected-right' : '');
        document.getElementById('l1-check-btn').style.display = 'inline-block';
    }

    function processL1Selection() {
        isQuestionAnswered = true;
        const correct = document.getElementById('l1-question').dataset.ans === "true";
        if (tempChoice === correct) {
            totalScore += 10;
            showFeedback("YES! 🌟", "correct-text");
        } else {
            showFeedback("Oops! 😮", "wrong-text");
        }
        document.getElementById('current-score').innerText = totalScore;
        document.getElementById('l1-check-btn').style.display = 'none';
        document.getElementById('l1-next-btn').style.display = 'inline-block';
    }

    function showFeedback(msg, cls) {
        const fb = document.getElementById('feedback-banner');
        fb.innerText = msg; fb.className = cls;
    }

    function loadQuestion() {
        const item = vocab[questionIndex];
        if (currentLevel === 1) {
            const match = Math.random() > 0.5;
            document.getElementById('l1-emoji').innerText = item.e;
            document.getElementById('l1-question').innerText = `Is it a ${match ? item.w : vocab[(questionIndex + 1) % vocab.length].w}?`;
            document.getElementById('l1-question').dataset.ans = match;
        } else if (currentLevel === 2) initL2();
        else if (currentLevel === 3) {
            document.getElementById('l3-emoji').innerText = item.e;
            document.getElementById('l3-target-text').innerText = `Say: It is a ${item.w}`;
        } else if (currentLevel === 4) initL4();
    }

    function initL2() {
        const item = vocab[questionIndex];
        document.getElementById('l2-emoji').innerText = item.e;
        document.getElementById('l2-display').innerText = "";
        const opt = document.getElementById('l2-options'); opt.innerHTML = "";
        let guess = "";
        item.w.split("").sort(() => Math.random()-0.5).forEach(c => {
            const t = document.createElement('div'); t.className = 'tile'; t.innerText = c.toUpperCase();
            t.onclick = () => {
                t.classList.add('selected'); guess += c.toLowerCase();
                document.getElementById('l2-display').innerText = guess.toUpperCase();
                if (guess === item.w) {
                    totalScore += 10; document.getElementById('l2-next-btn').style.display = 'inline-block';
                    document.getElementById('current-score').innerText = totalScore;
                } else if (guess.length === item.w.length) { setTimeout(initL2, 600); }
            };
            opt.appendChild(t);
        });
    }

    function initL4() {
        const item = vocab[questionIndex];
        const disp = document.getElementById('l4-display'); disp.innerText = "";
        const opt = document.getElementById('l4-options'); opt.innerHTML = "";
        let arr = [];
        ["It", "is", "a", item.w].sort(() => Math.random()-0.5).forEach(w => {
            const t = document.createElement('div'); t.className = 'tile'; t.innerText = w;
            t.onclick = () => {
                t.classList.add('selected'); arr.push(w); disp.innerText = arr.join(" ");
                if (arr.join(" ").toLowerCase() === `it is a ${item.w}`) {
                    totalScore += 10; document.getElementById('l4-next-btn').style.display = 'inline-block';
                    document.getElementById('current-score').innerText = totalScore;
                } else if (arr.length === 4) { setTimeout(initL4, 600); }
            };
            opt.appendChild(t);
        });
    }

    function startSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) { alert("Speech not supported in this browser."); return; }
        const rec = new SpeechRecognition();
        rec.lang = 'en-US'; 
        document.getElementById('mic-btn').style.background = '#f72585';
        rec.start();
        rec.onresult = (e) => {
            const talk = e.results[0][0].transcript.toLowerCase();
            if (talk.includes(vocab[questionIndex].w)) {
                totalScore += 10; document.getElementById('l3-next-btn').style.display = 'inline-block';
                document.getElementById('current-score').innerText = totalScore;
                document.getElementById('mic-btn').style.background = '#4ade80';
            }
        };
        rec.onend = () => { document.getElementById('mic-btn').style.background = '#4cc9f0'; };
    }

    function finishGame() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-final').classList.add('active');
        document.getElementById('final-stats').innerText = `${playerName}: ${totalScore} Stars!`;
        
        // Save Score to Hall of Fame
        const scores = JSON.parse(localStorage.getItem('heroScores')) || [];
        scores.push({name: playerName, score: totalScore});
        localStorage.setItem('heroScores', JSON.stringify(scores));
    }
</script>
</body>
</html>
