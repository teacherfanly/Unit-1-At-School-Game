<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure Hero</title>
    <style>
        :root {
            --primary: #4cc9f0; --secondary: #f72585; --success: #4ade80;
            --danger: #ff4d4d; --bg: #fdf0d5;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Comic Sans MS', cursive, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        #game-container { width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .screen { display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active { display: block; }
        
        /* UI Elements */
        .btn {
            background: var(--primary); color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px #3a0ca3; margin: 10px; transition: 0.2s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #3a0ca3; }
        .progress-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #inner-progress { width: 0%; height: 100%; background: var(--success); transition: 0.3s; }
        
        /* Level 1 Camera */
        #camera-wrapper { position: relative; width: 320px; height: 240px; margin: 0 auto; border: 5px solid white; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .zone { position: absolute; top: 0; width: 50%; height: 100%; opacity: 0.3; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; pointer-events: none; }
        #left-zone { left: 0; background: var(--success); border-right: 2px dashed white; }
        #right-zone { right: 0; background: var(--danger); }

        /* Level 2 & 4 Tiles */
        .tile-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .tile { 
            background: white; border: 3px solid var(--primary); padding: 10px 20px; 
            border-radius: 10px; cursor: pointer; font-size: 1.5rem; font-weight: bold;
            animation: bounce 2s infinite;
        }
        .tile.selected { opacity: 0.2; pointer-events: none; }
        
        .emoji-large { font-size: 6rem; margin: 10px; display: block; }
        .score-pop { position: fixed; top: 20%; font-size: 3rem; color: var(--secondary); font-weight: bold; pointer-events: none; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats" style="font-size: 1.5rem; font-weight: bold; color: var(--secondary); margin-bottom: 10px;">
        Score: <span id="current-score">0</span> ⭐ | Question: <span id="q-count">1</span>/10
    </div>
    <div class="progress-bar"><div id="inner-progress"></div></div>

    <div id="screen-login" class="screen active">
        <h1>English Hero! 🌟</h1>
        <input type="text" id="p-name" placeholder="Enter Name..." style="padding: 15px; border-radius: 20px; width: 70%; border: 2px solid var(--primary);">
        <br><button class="btn" onclick="startLevel(1)">START GAME 🎮</button>
    </div>

    <div id="screen-l1" class="screen">
        <h3>Move your head into the correct zone!</h3>
        <p id="l1-question">Is it a ...?</p>
        <div id="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div id="left-zone" class="zone">YES</div>
            <div id="right-zone" class="zone">NO</div>
        </div>
        <div id="l1-emoji" class="emoji-large"></div>
        <p>Left = Yes, it is. | Right = No, it isn't.</p>
    </div>

    <div id="screen-l2" class="screen">
        <h3>Spell the word!</h3>
        <div id="l2-emoji" class="emoji-large"></div>
        <div id="l2-display" style="font-size: 2.5rem; min-height: 50px; color: var(--secondary);"></div>
        <div id="l2-options" class="tile-box"></div>
        <button class="btn" style="background:var(--danger)" onclick="resetL2()">Reset 🔄</button>
    </div>

    <div id="screen-l3" class="screen">
        <h3>Say: "It is a [word]."</h3>
        <div id="l3-emoji" class="emoji-large"></div>
        <button id="mic-btn" class="btn" style="width:100px; height:100px; border-radius:50%; font-size:2rem;" onclick="startSpeech()">🎤</button>
        <p id="speech-feedback">Click mic to speak!</p>
    </div>

    <div id="screen-l4" class="screen">
        <h3>Put the words in order!</h3>
        <div id="l4-emoji" class="emoji-large"></div>
        <div id="l4-display" style="border-bottom: 3px dashed var(--primary); min-height: 60px; margin: 20px; font-size: 1.5rem; display: flex; justify-content: center; gap: 10px;"></div>
        <div id="l4-options" class="tile-box"></div>
        <button class="btn" style="background:var(--success)" onclick="checkL4()">Check Answer ✅</button>
        <button class="btn" style="background:var(--danger)" onclick="resetL4()">Reset 🔄</button>
    </div>

    <div id="screen-final" class="screen">
        <h1>Amazing Job! 🎉</h1>
        <div id="final-stats" style="font-size: 2rem; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px #ddd;"></div>
        <button class="btn" onclick="location.reload()">Play Again 🚀</button>
    </div>
</div>

<script>
    const vocab = [
        {w: 'pen', e: '🖊️'}, {w: 'pencil', e: '✏️'}, {w: 'desk', e: '🖥️'},
        {w: 'chair', e: '🪑'}, {w: 'bag', e: '🎒'}, {w: 'shoes', e: '👟'},
        {w: 'book', e: '📖'}, {w: 'ruler', e: '📏'}, {w: 'rubber', e: '🧼'},
        {w: 'notebook', e: '📓'}
    ];

    let currentLevel = 1;
    let questionIndex = 0;
    let totalScore = 0;
    let l1Active = false;
    let l1Lock = false; // Prevent double trigger

    // --- LEVEL 1 LOGIC (CAMERA) ---
    async function initCamera() {
        const video = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        
        // Simple Motion/Position Detection Logic
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320; canvas.height = 240;

        setInterval(() => {
            if (!l1Active || l1Lock) return;
            ctx.drawImage(video, 0, 0, 320, 240);
            const frame = ctx.getImageData(0, 0, 320, 240);
            let leftBrightness = 0, rightBrightness = 0;

            // Simple check: looking for "movement/mass" in zones
            for (let i = 0; i < frame.data.length / 2; i += 4) leftBrightness += frame.data[i];
            for (let i = frame.data.length / 2; i < frame.data.length; i += 4) rightBrightness += frame.data[i];

            // Trigger based on which side of the screen is "darker" (simulating a head presence)
            if (leftBrightness > rightBrightness + 100000) handleL1Input(true);
            else if (rightBrightness > leftBrightness + 100000) handleL1Input(false);
        }, 500);
    }

    function handleL1Input(isLeft) {
        l1Lock = true;
        const correct = document.getElementById('l1-question').dataset.ans === "true";
        if (isLeft === correct) addScore(10, "Yes, it is!");
        else addScore(0, "No, it isn't.");
        
        setTimeout(() => {
            l1Lock = false;
            nextQuestion();
        }, 1500);
    }

    function initL1() {
        l1Active = true;
        const item = vocab[questionIndex];
        const isMatch = Math.random() > 0.5;
        document.getElementById('l1-emoji').innerText = item.e;
        document.getElementById('l1-question').innerText = `Is it a ${isMatch ? item.w : 'dog'}?`;
        document.getElementById('l1-question').dataset.ans = isMatch;
    }

    // --- LEVEL 2: SPELLING ---
    let l2Guess = "";
    function initL2() {
        const item = vocab[questionIndex];
        document.getElementById('l2-emoji').innerText = item.e;
        l2Guess = "";
        document.getElementById('l2-display').innerText = "_ ".repeat(item.w.length);
        const chars = (item.w + "xyz").split("").sort(() => Math.random() - 0.5);
        const opt = document.getElementById('l2-options');
        opt.innerHTML = "";
        chars.forEach(c => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = c.toUpperCase();
            t.onclick = () => {
                if (t.classList.contains('selected')) return;
                t.classList.add('selected');
                l2Guess += c;
                document.getElementById('l2-display').innerText = l2Guess.toUpperCase();
                if (l2Guess.length === item.w.length) {
                    if (l2Guess === item.w) { addScore(10, "Great!"); nextQuestion(); }
                    else { resetL2(); }
                }
            };
            opt.appendChild(t);
        });
    }
    function resetL2() { l2Guess = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); document.getElementById('l2-display').innerText = ""; }

    // --- LEVEL 3: VOICE ---
    function initL3() {
        const item = vocab[questionIndex];
        document.getElementById('l3-emoji').innerText = item.e;
        document.getElementById('speech-feedback').innerText = `Say: "It is a ${item.w}"`;
    }
    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'en-US';
        document.getElementById('mic-btn').style.background = 'red';
        rec.start();
        rec.onresult = (e) => {
            const transcript = e.results[0][0].transcript.toLowerCase();
            const target = `it is a ${vocab[questionIndex].w}`;
            if (transcript.includes(target) || transcript.includes(vocab[questionIndex].w)) {
                addScore(10, "Perfect!"); nextQuestion();
            } else {
                document.getElementById('speech-feedback').innerText = "Try again! Say: It is a...";
            }
            document.getElementById('mic-btn').style.background = 'var(--primary)';
        };
    }

    // --- LEVEL 4: SENTENCE BUILDER ---
    let l4Current = [];
    function initL4() {
        const item = vocab[questionIndex];
        const sentence = ["It", "is", "a", item.w];
        l4Current = [];
        document.getElementById('l4-emoji').innerText = item.e;
        document.getElementById('l4-display').innerHTML = "";
        const opt = document.getElementById('l4-options');
        opt.innerHTML = "";
        [...sentence].sort(() => Math.random() - 0.5).forEach(w => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = w;
            t.onclick = () => {
                if (t.classList.contains('selected')) return;
                t.classList.add('selected');
                l4Current.push(w);
                const span = document.createElement('span'); span.innerText = w;
                document.getElementById('l4-display').appendChild(span);
            };
            opt.appendChild(t);
        });
    }
    function checkL4() {
        const correct = `Itisa${vocab[questionIndex].w}`.toLowerCase();
        const user = l4Current.join("").toLowerCase();
        if (user === correct) { addScore(10, "Correct!"); nextQuestion(); }
        else { alert("Wrong order! Resetting..."); resetL4(); }
    }
    function resetL4() { l4Current = []; document.getElementById('l4-display').innerHTML = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); }

    // --- CORE ENGINE ---
    function addScore(pts, msg) {
        totalScore += pts;
        document.getElementById('current-score').innerText = totalScore;
        const pop = document.createElement('div');
        pop.className = 'score-pop';
        pop.innerText = msg + " +" + pts;
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 1000);
    }

    function nextQuestion() {
        questionIndex++;
        if (questionIndex >= 10) {
            currentLevel++;
            questionIndex = 0;
            if (currentLevel > 4) return finishGame();
            startLevel(currentLevel);
        } else {
            document.getElementById('q-count').innerText = questionIndex + 1;
            document.getElementById('inner-progress').style.width = ((questionIndex + 1) * 10) + "%";
            loadQuestion();
        }
    }

    function startLevel(lvl) {
        currentLevel = lvl;
        questionIndex = 0;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-l${lvl}`).classList.add('active');
        if (lvl === 1) initCamera();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentLevel === 1) initL1();
        else if (currentLevel === 2) initL2();
        else if (currentLevel === 3) initL3();
        else if (currentLevel === 4) initL4();
    }

    function finishGame() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-final').classList.add('active');
        const name = document.getElementById('p-name').value || "Player";
        document.getElementById('final-stats').innerHTML = `
            ${name}'s Report Card Card<br>
            ⭐ Total Score: ${totalScore} / 400<br>
            🏆 Status: English Superstar!
        `;
    }
</script>
</body>
</html>
