<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure Hero</title>
    <style>
        :root {
            --primary: #4cc9f0; --secondary: #f72585; --success: #4ade80;
            --danger: #ff4d4d; --bg: #fdf0d5; --neutral: #ced4da;
        }
        body { 
            margin: 0; background: var(--bg); font-family: 'Comic Sans MS', cursive, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        #game-container { width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .screen { display: none; animation: popIn 0.4s ease-out; }
        .active { display: block; }
        
        /* UI Elements */
        .btn {
            background: var(--primary); color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px #3a0ca3; margin: 10px; transition: 0.2s;
        }
        .progress-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; margin: 10px 0; }
        #inner-progress { width: 0%; height: 100%; background: var(--success); border-radius: 10px; transition: 0.3s; }
        
        /* Level 1 Camera Layout */
        .q-area { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px #ccc; }
        #camera-wrapper { 
            position: relative; width: 400px; height: 300px; margin: 0 auto; 
            border: 8px solid white; border-radius: 20px; overflow: hidden; 
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .zone { position: absolute; top: 0; width: 30%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: white; transition: 0.3s; }
        #left-zone { left: 0; background: rgba(74, 222, 128, 0.4); border-right: 4px solid var(--success); }
        #right-zone { right: 0; background: rgba(255, 77, 77, 0.4); border-left: 4px solid var(--danger); }
        .zone.active-choice { background: rgba(255, 255, 255, 0.8) !important; color: black; transform: scale(1.05); }
        
        .wait-timer { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 5px 15px; border-radius: 20px; display: none; }

        /* Level 2 & 4 Tiles */
        .tile-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .tile { 
            background: white; border: 3px solid var(--primary); padding: 12px 22px; 
            border-radius: 15px; cursor: pointer; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 4px #4cc9f0;
        }
        .tile.selected { background: #eee; color: #ccc; box-shadow: none; pointer-events: none; }
        
        .emoji-large { font-size: 6rem; margin: 5px; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats" style="font-size: 1.3rem; font-weight: bold; color: var(--secondary);">
        ⭐ Score: <span id="current-score">0</span> | Q: <span id="q-count">1</span>/10
    </div>
    <div class="progress-bar"><div id="inner-progress"></div></div>

    <div id="screen-login" class="screen active">
        <h1>School Adventure! 🎒</h1>
        <p>Hello! What is your name?</p>
        <input type="text" id="p-name" placeholder="Type name here..." style="padding: 15px; border-radius: 20px; width: 80%; border: 3px solid var(--primary); font-size: 1.2rem;">
        <br><button class="btn" onclick="startLevel(1)">START GAME 🚀</button>
    </div>

    <div id="screen-l1" class="screen">
        <div class="q-area">
            <div id="l1-emoji" class="emoji-large"></div>
            <h2 id="l1-question">...</h2>
        </div>
        
        <div id="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div id="left-zone" class="zone">Yes, it is.</div>
            <div id="right-zone" class="zone">No, it isn't.</div>
            <div id="wait-timer" class="wait-timer">Hold it...</div>
        </div>
        <p>Stand in the middle! Lean Left or Right to answer.</p>
    </div>

    <div id="screen-l2" class="screen">
        <div class="q-area">
            <div id="l2-emoji" class="emoji-large"></div>
            <div id="l2-display" style="font-size: 2.5rem; letter-spacing: 10px; color: var(--secondary); font-weight: bold;"></div>
        </div>
        <div id="l2-options" class="tile-box"></div>
        <button class="btn" style="background:var(--danger)" onclick="resetL2()">Try Again 🔄</button>
    </div>

    <div id="screen-l3" class="screen">
        <div class="q-area">
            <div id="l3-emoji" class="emoji-large"></div>
            <h3>Say: <span id="l3-target-text" style="color:var(--secondary)">It is a bag.</span></h3>
        </div>
        <button id="mic-btn" class="btn" style="width:120px; height:120px; border-radius:50%; font-size:3rem;" onclick="startSpeech()">🎤</button>
        <p id="speech-feedback">Click the mic and speak clearly!</p>
    </div>

    <div id="screen-l4" class="screen">
        <div class="q-area">
            <div id="l4-emoji" class="emoji-large"></div>
            <div id="l4-display" style="border-bottom: 4px dashed var(--primary); min-height: 70px; font-size: 1.8rem; display: flex; justify-content: center; align-items: center; gap: 10px;"></div>
        </div>
        <div id="l4-options" class="tile-box"></div>
        <div style="display:flex; justify-content: center;">
            <button class="btn" style="background:var(--success)" onclick="checkL4()">Check ✅</button>
            <button class="btn" style="background:var(--danger)" onclick="resetL4()">Clear ❌</button>
        </div>
    </div>

    <div id="screen-final" class="screen">
        <h1>Hooray! Finished! 🏆</h1>
        <div id="final-stats" style="font-size: 1.8rem; background: white; padding: 30px; border-radius: 30px; border: 5px solid var(--primary);"></div>
        <button class="btn" onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<script>
    const vocab = [
        {w: 'pen', e: '🖊️'}, {w: 'pencil', e: '✏️'}, {w: 'desk', e: '🖥️'},
        {w: 'chair', e: '🪑'}, {w: 'bag', e: '🎒'}, {w: 'shoes', e: '👟'},
        {w: 'book', e: '📖'}, {w: 'ruler', e: '📏'}, {w: 'rubber', e: '🧼'},
        {w: 'notebook', e: '📓'}
    ];

    let currentLevel = 1;
    let questionIndex = 0;
    let totalScore = 0;
    let videoStream = null;
    let stabilityCounter = 0;
    let currentDetection = null;

    // --- CAMERA STOPPER ---
    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
    }

    // --- LEVEL 1: CAMERA LOGIC ---
    async function initL1Camera() {
        const video = document.getElementById('video');
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = videoStream;
            detectMotion();
        } catch (e) { alert("Please allow camera for Level 1!"); }
    }

    function detectMotion() {
        if (!videoStream || currentLevel !== 1) return;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 160; canvas.height = 120;

        const loop = () => {
            if (!videoStream || currentLevel !== 1) return;
            ctx.drawImage(document.getElementById('video'), 0, 0, 160, 120);
            const frame = ctx.getImageData(0, 0, 160, 120);
            
            let leftDark = 0, rightDark = 0;
            // Scan left 30% and right 30%
            for (let i = 0; i < frame.data.length; i += 4) {
                const x = (i / 4) % 160;
                const brightness = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
                if (brightness < 100) { // Detecting dark mass (pupil's head/body)
                    if (x < 50) leftDark++;
                    if (x > 110) rightDark++;
                }
            }

            const waitUI = document.getElementById('wait-timer');
            const lZone = document.getElementById('left-zone');
            const rZone = document.getElementById('right-zone');

            if (leftDark > 1200) {
                updateStability('left');
                lZone.classList.add('active-choice');
                rZone.classList.remove('active-choice');
            } else if (rightDark > 1200) {
                updateStability('right');
                rZone.classList.add('active-choice');
                lZone.classList.remove('active-choice');
            } else {
                updateStability(null);
                lZone.classList.remove('active-choice');
                rZone.classList.remove('active-choice');
            }
            requestAnimationFrame(loop);
        };
        loop();
    }

    function updateStability(side) {
        const waitUI = document.getElementById('wait-timer');
        if (side && side === currentDetection) {
            stabilityCounter++;
            waitUI.style.display = 'block';
            waitUI.innerText = "Holding... " + "⭐".repeat(Math.floor(stabilityCounter/15));
            if (stabilityCounter > 50) { // Approx 1.5 - 2 seconds
                stabilityCounter = 0;
                handleL1Answer(side === 'left');
            }
        } else {
            stabilityCounter = 0;
            currentDetection = side;
            waitUI.style.display = 'none';
        }
    }

    function handleL1Answer(userChoice) {
        const isMatch = document.getElementById('l1-question').dataset.ans === "true";
        if (userChoice === isMatch) addScore(10);
        else addScore(0);
        nextQuestion();
    }

    function initL1Question() {
        const item = vocab[questionIndex];
        const isMatch = Math.random() > 0.5;
        document.getElementById('l1-emoji').innerText = item.e;
        document.getElementById('l1-question').innerText = `Is it a ${isMatch ? item.w : vocab[(questionIndex+1)%10].w}?`;
        document.getElementById('l1-question').dataset.ans = isMatch;
    }

    // --- LEVEL 2: SPELLING ---
    let l2Guess = "";
    function initL2() {
        const item = vocab[questionIndex];
        l2Guess = "";
        document.getElementById('l2-emoji').innerText = item.e;
        document.getElementById('l2-display').innerText = "";
        const opt = document.getElementById('l2-options');
        opt.innerHTML = "";
        (item.w).split("").sort(() => Math.random() - 0.5).forEach(c => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = c.toUpperCase();
            t.onclick = () => {
                t.classList.add('selected');
                l2Guess += c;
                document.getElementById('l2-display').innerText = l2Guess.toUpperCase();
                if (l2Guess.length === item.w.length) {
                    if (l2Guess === item.w) { addScore(10); nextQuestion(); }
                    else { setTimeout(resetL2, 1000); }
                }
            };
            opt.appendChild(t);
        });
    }
    function resetL2() { l2Guess = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); document.getElementById('l2-display').innerText = ""; }

    // --- LEVEL 3: VOICE ---
    function initL3() {
        const item = vocab[questionIndex];
        document.getElementById('l3-emoji').innerText = item.e;
        document.getElementById('l3-target-text').innerText = `It is a ${item.w}.`;
    }
    function startSpeech() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'en-US';
        document.getElementById('mic-btn').style.boxShadow = '0 0 20px red';
        rec.start();
        rec.onresult = (e) => {
            const speech = e.results[0][0].transcript.toLowerCase();
            const target = `it is a ${vocab[questionIndex].w}`;
            if (speech.includes(target) || speech.includes(vocab[questionIndex].w)) {
                addScore(10); nextQuestion();
            } else {
                document.getElementById('speech-feedback').innerText = "I heard: " + speech + ". Try again!";
            }
            document.getElementById('mic-btn').style.boxShadow = '0 5px #3a0ca3';
        };
    }

    // --- LEVEL 4: SENTENCE ---
    let l4Current = [];
    function initL4() {
        const item = vocab[questionIndex];
        const sentence = ["It", "is", "a", item.w];
        l4Current = [];
        document.getElementById('l4-emoji').innerText = item.e;
        document.getElementById('l4-display').innerHTML = "";
        const opt = document.getElementById('l4-options');
        opt.innerHTML = "";
        [...sentence].sort(() => Math.random() - 0.5).forEach(w => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = w;
            t.onclick = () => {
                if (t.classList.contains('selected')) return;
                t.classList.add('selected');
                l4Current.push(w);
                const span = document.createElement('span'); span.innerText = w;
                document.getElementById('l4-display').appendChild(span);
            };
            opt.appendChild(t);
        });
    }
    function checkL4() {
        const correct = `Itisa${vocab[questionIndex].w}`.toLowerCase();
        if (l4Current.join("").toLowerCase() === correct) { addScore(10); nextQuestion(); }
        else { alert("Not quite right! Try again."); resetL4(); }
    }
    function resetL4() { l4Current = []; document.getElementById('l4-display').innerHTML = ""; document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected')); }

    // --- ENGINE ---
    function addScore(pts) {
        totalScore += pts;
        document.getElementById('current-score').innerText = totalScore;
        if (pts > 0) createConfetti();
    }

    function nextQuestion() {
        questionIndex++;
        if (questionIndex >= 10) {
            if (currentLevel === 1) stopCamera(); // KILL CAMERA AFTER L1
            currentLevel++;
            questionIndex = 0;
            if (currentLevel > 4) return finishGame();
            startLevel(currentLevel);
        } else {
            document.getElementById('q-count').innerText = questionIndex + 1;
            document.getElementById('inner-progress').style.width = ((questionIndex) * 10) + "%";
            loadQuestion();
        }
    }

    function startLevel(lvl) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-l${lvl}`).classList.add('active');
        document.getElementById('inner-progress').style.width = "0%";
        document.getElementById('q-count').innerText = "1";
        if (lvl === 1) initL1Camera();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentLevel === 1) initL1Question();
        if (currentLevel === 2) initL2();
        if (currentLevel === 3) initL3();
        if (currentLevel === 4) initL4();
    }

    function finishGame() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-final').classList.add('active');
        const name = document.getElementById('p-name').value || "Pupil";
        document.getElementById('final-stats').innerHTML = `
            Great Job, <b>${name}</b>!<br><br>
            Your Score: <span style="color:var(--secondary)">${totalScore} ⭐</span><br>
            <small>You are an English Star!</small>
        `;
    }

    function createConfetti() {
        for(let i=0; i<15; i++) {
            const c = document.createElement('div');
            c.style.position = 'fixed';
            c.style.left = Math.random()*100+'vw';
            c.style.top = '-10px';
            c.style.width = '10px'; c.style.height = '10px';
            c.style.backgroundColor = ['#f72585','#4cc9f0','#4ade80'][Math.floor(Math.random()*3)];
            document.body.appendChild(c);
            c.animate([{transform:'translateY(0)'},{transform:'translateY(100vh) rotate(360deg)'}], {duration: 2000}).onfinish = () => c.remove();
        }
    }
</script>
</body>
</html>
